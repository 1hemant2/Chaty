<!DOCTYPE html>
<html>
<head>
  <title>Socket.IO Client</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input, textarea {
      background-color: #1e1e1e;
      color: #ffffff;
      border: 1px solid #444;
      padding: 8px;
      margin-right: 5px;
    }
    button {
      background-color: #333;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
    #messages {
      margin-top: 20px;
      list-style-type: none;
      padding: 0;
    }
    #messages li {
      margin-bottom: 10px;
      padding: 6px 10px;
      background-color: #1f1f1f;
      border-radius: 4px;
    }
    .section-title {
      margin-top: 30px;
      color: #bbbbbb;
    }
    #customJsonInput {
      width: 300px;
      height: 70px;
      vertical-align: top;
      margin-right: 5px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <h2>Chat Client</h2>
  <!-- User Join -->
  <input id="userIdInput" placeholder="Enter your userId..." />
  <button onclick="connectUser()">Join Chat</button>
  <br><br>
  <!-- Thread Join -->
  <input id="threadIdInput" placeholder="Enter threadId..." />
  <button onclick="joinThread()">Join Thread</button>
  <br><br>
  <!-- Send Message -->
  <input id="senderIdInput" placeholder="Sender userId..." />
  <input id="receiverIdInput" placeholder="Receiver userId..." />
  <input id="messageInput" placeholder="Message..." />
  <button onclick="sendMessage()">Send</button>
  <br><br>
  <!-- Custom Event Sender -->
  <span class="section-title">Custom Event Tester</span><br>
  <input id="customEventInput" placeholder="Event name (e.g. chat_message)" style="width:190px" />
  <textarea id="customJsonInput" placeholder='JSON payload here (e.g. {"foo": "bar"})'></textarea>
  <button onclick="sendCustomEvent()">Send Custom Event</button>
  <br><br>
  <!-- Messages -->
  <ul id="messages"></ul>

  <script>
    let socket = null;
    let connected = false;

    function connectUser() {
      const userId = document.getElementById('userIdInput').value.trim();
      if (!userId) {
        alert("Please enter your userId.");
        return;
      }

      socket = io('http://127.0.0.1:3000');

      socket.on('connect', () => {
        console.log('✅ Connected with ID:', socket.id); 
        socket.emit('user_join', { userId });
        connected = true;
      });
      socket.on('user_status', (data) => { 
        console.log('user_status data ', data);
        const { userId, status } = data;
        appendMessage(`User ${userId} status: ${status}`);
      });

      socket.on('user_join', (data) => {
        appendMessage(`User ${data.hello} has joined the chat.`);
      });

      socket.on('chat_message', (data) => {
        appendMessage(`${data.senderId} ➡️ : ${data.message}`);
        socket.emit('message_ack', {
          ...data,
          messageStatus : 'read'
        });
      });

      socket.on('disconnect', () => {
        console.warn('🚪 Disconnected from server');
        connected = false;
      });

      socket.on('message_status', (data) => {
        const { messageId, messageStatus } = data;
        appendMessage(`📬 Message ${messageId} marked as ${messageStatus}`);
      });
       
      socket.on('notify_message_outside_thread', (data) => {
         const { threadId, fromUser, messagePreview, messageType, unreadCount, timestamp, messageId } = data;
         appendMessage(`🔔 New message in thread ${threadId} from ${fromUser.name} (${fromUser.id}) → "${messagePreview}" [${messageType}] at ${new Date(timestamp).toLocaleTimeString()}. ${unreadCount} unread.`);
         socket.emit('message_ack', {
           senderId : fromUser?.senderId,
           messageStatus : 'delivered', 
           messageId : messageId
        })
      });
        
      socket.on('self_message_notification', (data) => {
        const {
          threadId,
          fromUser,
          messagePreview,
          type,
          unreadCount,
          date,
          messageId
        } = data;
        appendMessage(`📨 Your message in thread ${threadId} was: "${messagePreview}" [${type}] at ${new Date(date).toLocaleTimeString()}. ${unreadCount} unread`);
        socket.emit('message_ack', {
          senderId: fromUser?.senderId,
          messageStatus: 'delivered',
          messageId
        });
      });

      socket.on('error', (error) => {
        console.error('❌ Connection error:', error);
      });

      // Optionally: log all (for dev/debug)
      window.debugListenAll && socket.onAny((event, ...args) => {
        appendMessage(`(debug) Event: ${event} - ${JSON.stringify(args)}`);
      });
    }

    function joinThread() {
      if (!connected || !socket) {
        alert("⚠️ Not connected. Join chat first.");
        return;
      }
      const threadId = document.getElementById('threadIdInput').value.trim();
      const currentUserId = document.getElementById('userIdInput').value.trim();
      if (!threadId || !currentUserId) {
        alert("Please enter both threadId and your userId.");
        return;
      }
      socket.emit('join_thread', { threadId, userId: currentUserId });
      appendMessage(`🔗 You (${currentUserId}) joined thread ${threadId}`);
    }

    function sendMessage() {
      const senderId = document.getElementById('senderIdInput').value.trim();
      const receiverId = document.getElementById('receiverIdInput').value.trim();
      const message = document.getElementById('messageInput').value.trim();
      if (!connected || !socket) {
        alert("⚠️ Not connected.");
        return;
      }
      if (!senderId || !receiverId || !message) {
        alert("❗ Please fill in sender, receiver, and message.");
        return;
      }
      socket.emit('chat_message', {
        currentUserId: senderId,
        otherUserId: receiverId,
        message: message
      });
      document.getElementById('messageInput').value = '';
    }

    // --- BELOW IS THE ADDED FUNCTIONALITY ---
    function sendCustomEvent() {
      if (!connected || !socket) {
        alert("⚠️ Not connected. Join chat first.");
        return;
      }
      const eventName = document.getElementById('customEventInput').value.trim();
      const jsonValue = document.getElementById('customJsonInput').value.trim();
      if (!eventName || !jsonValue) {
        alert("Please provide event name and JSON payload.");
        return;
      }
      let payload;
      try {
        payload = JSON.parse(jsonValue);
      } catch (e) {
        alert("❌ Invalid JSON: " + e.message);
        return;
      }
      appendMessage(`🚀 Sending custom event <b>${eventName}</b> with data: ${jsonValue}`);
      socket.emit(eventName, payload);
    }

    function appendMessage(msg) {
      const li = document.createElement('li');
      li.innerHTML = msg;
      document.getElementById('messages').appendChild(li);
    }
  </script>
</body>
</html>
